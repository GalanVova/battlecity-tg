  <script type="text/javascript">
    $(function () {
      var FPS = 50;
      var CANVAS_ID = 'canvas';

      // ── Telegram WebApp ──────────────────────────────────
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes && tg.disableVerticalSwipes();
      }

      // ── Canvas ───────────────────────────────────────────
      var ctx = createCanvasContext();
      ctx.font = "16px prstart";

      var eventManager = new EventManager();
      var keyboard     = new Keyboard(eventManager);
      var sceneManager = new SceneManager(eventManager);

      // ── Определяем SERVER_URL ────────────────────────────
      // При открытии через Telegram Mini App — берём из URL параметра
      // или из window.location (если игра на том же сервере)
      var serverUrl = (function() {
        var params = new URLSearchParams(window.location.search);
        if (params.get('server')) return params.get('server');
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        return proto + '//' + location.host;
      })();

      // ── WebSocket подключение ────────────────────────────
      var ws = null;
      var touchControls = null;
      var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || (tg != null);

      // Подключаемся к серверу в фоне — но НЕ меняем сцену
      // Меню остаётся оригинальным: 1 PLAYER / 2 PLAYERS / MULTIPLAYER / CONSTRUCTION
      function connectToServer(callback) {
        try {
          ws = new WebSocket(serverUrl);
        } catch(e) {
          if (callback) callback(null);
          return;
        }
        ws.onopen = function() {
          window._bcWs = ws;
          window._bcEventManager = eventManager;
          window._bcCanvas = document.getElementById(CANVAS_ID);
          window._bcIsMobile = isMobile;
          if (callback) callback(ws);
        };
        ws.onerror = function() {
          if (callback) callback(null);
        };
      }

      // Глобальная функция для открытия мультиплеер-лобби
      // Вызывается из MultiplayerMenuItem.execute()
      window.openMultiplayerLobby = function() {
        if (window._bcWs && window._bcWs.readyState === 1) {
          // Уже подключены
          sceneManager._eventManager.removeAllSubscribers();
          sceneManager._scene = new MultiplayerLobby(sceneManager, window._bcWs);
        } else {
          // Подключаемся и открываем лобби
          connectToServer(function(ws) {
            if (!ws) {
              alert('Не удалось подключиться к серверу.\nПроверь что server.js запущен.');
              return;
            }
            sceneManager._eventManager.removeAllSubscribers();
            sceneManager._scene = new MultiplayerLobby(sceneManager, ws);
          });
        }
      };

      // Запускаем игру — показываем обычное меню
      sceneManager.toLoadingScene();
      // Подключаемся к серверу в фоне (чтобы мультиплеер открылся быстрее)
      connectToServer(function(ws) {
        // Просто сохраняем соединение, меню не меняем
        console.log(ws ? 'Сервер доступен' : 'Сервер недоступен — только одиночная игра');
      });
      setInterval(gameLoop, 1000 / FPS);

      function gameLoop() {
        keyboard.fireEvents();
        if (sceneManager._scene) {
          sceneManager.update();
          sceneManager.draw(ctx);
        }
      }

      function createCanvasContext() {
        var w = Math.min(window.innerWidth, Globals.CANVAS_WIDTH  * 2);
        var h = Math.min(window.innerHeight, Globals.CANVAS_HEIGHT * 2);
        // На телефоне масштабируем под экран
        if (isMobile) {
          var scale = Math.min(window.innerWidth / Globals.CANVAS_WIDTH,
                               window.innerHeight / Globals.CANVAS_HEIGHT);
          w = Math.floor(Globals.CANVAS_WIDTH  * scale);
          h = Math.floor(Globals.CANVAS_HEIGHT * scale);
        } else {
          w = Globals.CANVAS_WIDTH;
          h = Globals.CANVAS_HEIGHT;
        }
        var el = $('<canvas id="' + CANVAS_ID + '" width="' + Globals.CANVAS_WIDTH +
                   '" height="' + Globals.CANVAS_HEIGHT + '"></canvas>');
        el.css({ width: w + 'px', height: h + 'px',
                 'image-rendering': 'pixelated', display: 'block', margin: '0 auto' });
        el.prependTo('#main');
        return document.getElementById(CANVAS_ID).getContext('2d');
      }

      // Убираем правую панель на мобильных
      if (isMobile || tg) {
        $('#help').hide();
        $('body').css({ background: '#000', margin: 0 });
      }
    });
