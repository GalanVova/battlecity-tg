  <style>
    html, body { margin:0; background:#000; overflow:hidden; width:100%; height:100%; }
    #main { width:100%; height:100%; overflow:hidden; }
    canvas { touch-action:none; }
  </style>

  <script>
    $(function () {
      var FPS = 50;
      var CANVAS_ID = 'canvas';
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
      }

      var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || !!tg;
      window._bcAutoMultiplayer = isMobile;

      var ctx = createCanvasContext();
      ctx.font = '16px prstart';

      var eventManager = new EventManager();
      var keyboard = new Keyboard(eventManager);
      var sceneManager = new SceneManager(eventManager);
      var ws = null;
      var touchControls = null;
      var multiplayerSync = null;

      var serverUrl = (function () {
        var params = new URLSearchParams(window.location.search);
        if (params.get('server')) return params.get('server');
        return 'wss://battlecity-tg.onrender.com';
      })();

      function installTouchControls(options) {
        if (!isMobile) return;
        if (touchControls) touchControls.destroy();
        touchControls = options || new TouchControls(document.getElementById(CANVAS_ID), eventManager);
        touchControls.show();
        window._bcTouchControls = touchControls;
      }

      function connectToServer(callback) {
        if (ws && (ws.readyState === 0 || ws.readyState === 1)) {
          if (ws.readyState === 1 && callback) callback(ws);
          return;
        }
        try {
          ws = new WebSocket(serverUrl);
        } catch (e) {
          if (callback) callback(null);
          return;
        }
        ws.onopen = function () {
          window._bcWs = ws;
          window._bcEventManager = eventManager;
          window._bcCanvas = document.getElementById(CANVAS_ID);
          window._bcIsMobile = isMobile;
          if (callback) callback(ws);
        };
        ws.onerror = function () {
          if (callback) callback(null);
        };
      }

      window.openMultiplayerLobby = function () {
        function open(readyWs) {
          if (!readyWs) {
            alert('Не удалось подключиться к серверу комнат. Попробуй ещё раз через минуту.');
            return;
          }
          sceneManager.toMultiplayerLobby(readyWs);
        }
        if (window._bcWs && window._bcWs.readyState === 1) open(window._bcWs);
        else connectToServer(open);
      };

      window.startNetworkGame = function (role, roomWs) {
        TankPowerSelectScene.twoPlayers = true;
        sceneManager.toGameScene();
        multiplayerSync = new MultiplayerSync(roomWs, role, eventManager);
        window._bcMultiplayerSync = multiplayerSync;

        if (isMobile) {
          installTouchControls(MultiplayerSync.createTouchControls(
            document.getElementById(CANVAS_ID), eventManager, roomWs, role
          ));
        }
      };

      sceneManager.toLoadingScene();
      installTouchControls();
      connectToServer(function (readyWs) {
        console.log(readyWs ? 'Room server connected' : 'Room server unavailable');
      });

      setInterval(function () {
        keyboard.fireEvents();
        if (sceneManager._scene) {
          sceneManager.update();
          sceneManager.draw(ctx);
        }
      }, 1000 / FPS);

      function createCanvasContext() {
        var w = Globals.CANVAS_WIDTH;
        var h = Globals.CANVAS_HEIGHT;
        if (isMobile) {
          var controlsHeight = Math.min(220, Math.max(165, Math.floor(window.innerHeight * 0.30)));
          var availableHeight = Math.max(250, window.innerHeight - controlsHeight);
          var scale = Math.min(window.innerWidth / Globals.CANVAS_WIDTH,
                               availableHeight / Globals.CANVAS_HEIGHT);
          w = Math.floor(Globals.CANVAS_WIDTH * scale);
          h = Math.floor(Globals.CANVAS_HEIGHT * scale);
        }
        var el = $('<canvas id="' + CANVAS_ID + '" width="' + Globals.CANVAS_WIDTH +
                   '" height="' + Globals.CANVAS_HEIGHT + '"></canvas>');
        el.css({ width:w+'px', height:h+'px', 'image-rendering':'pixelated', display:'block', margin:'0 auto' });
        el.prependTo('#main');
        return document.getElementById(CANVAS_ID).getContext('2d');
      }

      if (isMobile) $('#help').hide();
    });
  </script>

        <tr><td>PLAYER 2</td><td>WASD + E</td></tr>
        <tr><td>MENU</td><td>ARROWS + ENTER</td></tr>
